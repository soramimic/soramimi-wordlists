name: update-wordlists

on:
  schedule:
    - cron: "0 21 5 1 *" # 毎年1月6日 6:00 JST
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Update pokemon.csv (PokéAPI)
        run: python tools/update_pokemon.py

      - name: Update nations.csv (mledoze/countries)
        run: python tools/update_nations.py

      - name: Update stations.csv (Wikidata/Wikipedia)
        run: python tools/update_stations.py

      - name: Update baseball.csv (Wikipedia rosters)
        run: python tools/update_baseball.py

      - name: Update football.csv (Wikipedia rosters)
        run: python tools/update_football.py

      - name: Update physicist.csv (Wikidata/Wikipedia)
        run: python tools/update_physicist.py

      - name: Update sekitsui.csv (Wikidata taxa)
        run: python tools/update_sekitsui.py

      - name: Backfill images (Wikidata P18)
        run: python tools/enrich_images.py

      - name: Validate CSVs
        run: python tools/validate_csvs.py

      - name: Create pull request if changed
        id: cpr
        uses: peter-evans/create-pull-request@v7
        with:
          # AUTOMERGE_PAT(fine-grained PAT)があればそれを使う。
          # GITHUB_TOKENだと作られたPRでpull_requestワークフロー(ci)が
          # 走らず、required checks待ちのauto-mergeが完了しないため
          token: ${{ secrets.AUTOMERGE_PAT != '' && secrets.AUTOMERGE_PAT || github.token }}
          branch: auto/update-wordlists
          title: "自動更新: 単語リスト(年次バッチ)"
          commit-message: "自動更新: 単語リスト(年次バッチ)"
          body: |
            定期バッチ(update-wordlists)による自動更新です。
            実行ログの「要確認」も確認してください。CIが通れば自動マージされます。
          delete-branch: true

      - name: Enable auto-merge
        if: steps.cpr.outputs.pull-request-number
        env:
          GH_TOKEN: ${{ secrets.AUTOMERGE_PAT != '' && secrets.AUTOMERGE_PAT || github.token }}
        run: gh pr merge --auto --squash "${{ steps.cpr.outputs.pull-request-number }}" -R "${{ github.repository }}"
